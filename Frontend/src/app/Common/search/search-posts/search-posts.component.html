 <div class="container">
    <app-search-header></app-search-header>
    <div class ="tab-content">
            <div class="content-section px-3">
                <div class="search-item">
                    <div class="search-item-content">
                        <div class="search-item-left">
                            <i class="bi bi-file-text search-item-icon"></i>
                            <span class="search-item-text">Best travel destinations 2024</span>
                        </div>
                    </div>
                </div>

                <div class="search-item">
                    <div class="search-item-content">
                        <div class="search-item-left">
                            <i class="bi bi-file-text search-item-icon"></i>
                            <span class="search-item-text">Summer food recipes</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        </div>
<script>
    document.getElementById('searchInput').addEventListener('input', function (e) {
        const searchTerm = e.target.value.toLowerCase();

        if (searchTerm.length > 0) {
            document.querySelectorAll('.content-section').forEach(section => {
                section.style.display = 'none';
            });

            console.log('Searching for:', searchTerm);
        } else {
            document.querySelectorAll('.content-section').forEach(section => {
                section.style.display = 'block';
            });
        }
    });

    document.querySelectorAll('.search-item').forEach(item => {
        item.addEventListener('click', function () {
            const text = this.querySelector('.search-item-text').textContent;
            document.getElementById('searchInput').value = text;
            console.log('Selected:', text);
        });
    });

    document.querySelector('.cancel-btn').addEventListener('click', function (e) {
        e.preventDefault();
        document.getElementById('searchInput').value = '';
        document.querySelectorAll('.content-section').forEach(section => {
            section.style.display = 'block';
        });
    });
    document.getElementById('searchInput').focus();
</script>
