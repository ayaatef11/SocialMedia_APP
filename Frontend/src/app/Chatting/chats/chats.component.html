<div class="col-md-12 chat-panel">
    <div class="chat-header d-flex align-items-center position-relative">
        <div class="position-relative me-3">
            <img src="profile.jpg" alt="Sarah" class="contact-avatar" style="width: 40px; height: 40px;">
            <div class="online-indicator" style="width: 10px; height: 10px;"></div>
        </div>
        <div>
            <div class="contact-name">Sarah</div>
            <div class="status-text">Active now</div>
        </div>
        <button class="more-options">
            <i class="fas fa-ellipsis-v"></i>
        </button>
    </div>

    <div class="chat-messages">
        <div class="message received">
            <div class="message-bubble">
                Sure! How about 2pm?
                <div class="message-time">12:45</div>
            </div>
        </div>

        <div class="message sent">
            <div class="message-bubble">
                That works for me. See you then!
                <div class="message-time">12:45</div>
            </div>
        </div>

        <div class="message received">
            <div class="message-bubble">
                Great! Going to the meeting tomorrow?
                <div class="message-time">12:46</div>
            </div>
        </div>

        <div class="message sent">
            <div class="message-bubble">
                Hello! Yes, I'll be there.
                <div class="message-time">12:48</div>
            </div>
        </div>

        <div class="message received">
            <div class="message-bubble">
                Here is the report from the meeting. Could you review it
                <div class="message-time">12:47</div>
            </div>
        </div>
    </div>

    <div class="chat-input">
        <div class="input-group">
            <span class="input-group-text">
                <i class="far fa-smile"></i>
            </span>
            <input type="text" class="form-control message-input" placeholder="Type a message...">
            <button class="send-btn">
                <i class="fas fa-microphone"></i>
            </button>
        </div>
    </div>
</div>
