<div class="settings-card card">
    <div class="card-header">
        <h5 class="card-title mb-0">
            <i class="fas fa-key me-2 text-success"></i>Change Password
        </h5>
    </div>
    <div class="card-body">
        <form>
            <div class="mb-3">
                <label class="form-label">Current Password</label>
                <input type="password" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label">New Password</label>
                <input type="password" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label">Confirm New Password</label>
                <input type="password" class="form-control">
            </div>
            <button type="submit" class="btn btn-success">Update Password</button>
        </form>
    </div>
</div>

<div class="settings-card card">
    <div class="card-header">
        <h5 class="card-title mb-0">
            <i class="fas fa-database me-2 text-success"></i>Storage Usage
        </h5>
    </div>
    <div class="card-body">
        <div class="d-flex justify-content-between mb-2">
            <span>Used Storage</span>
            <span><strong>4.2 GB</strong> of 10 GB</span>
        </div>
        <div class="storage-bar mb-3">
            <div class="storage-fill" style="width: 42%"></div>
        </div>
        <div class="row text-center">
            <div class="col-4">
                <div class="text-muted small">Photos</div>
                <div class="fw-bold">2.1 GB</div>
            </div>
            <div class="col-4">
                <div class="text-muted small">Documents</div>
                <div class="fw-bold">1.8 GB</div>
            </div>
            <div class="col-4">
                <div class="text-muted small">Other</div>
                <div class="fw-bold">0.3 GB</div>
            </div>
        </div>
    </div>
</div>
