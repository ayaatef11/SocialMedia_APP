<div class="">
<div class="d-flex justify-content-between align-items-center p-3 border-bottom">
  <h4 class="mb-0">Notifications</h4>
  <button class="bg-success rounded" (click)="markAllAsRead()">Mark all as read</button>
</div>
<ul class="nav nav-tabs px-3 pt-3">
  <li class="nav-item">
    <a class="nav-link active text-success" routerLink="all" routerLinkActive="active"
      [routerLinkActiveOptions]="{exact:true}">All</a>
  </li>
  <li class="nav-item">
    <a class="nav-link text-success" routerLink="unread" routerLinkActive="active">Unread</a>
  </li>
  <li class="nav-item">
    <a class="nav-link text-success" routerLink="comments" routerLinkActive="active">Comments</a>
  </li>
  <li class="nav-item">
    <a class="nav-link text-success" routerLink="likes" routerLinkActive="active">Likes</a>
  </li>
</ul>
<router-outlet></router-outlet>
</div>
