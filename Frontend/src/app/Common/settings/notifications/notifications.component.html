<div class="settings-card card">
    <div class="card-header">
        <h5 class="card-title mb-0">
            <i class="fas fa-bell me-2 text-success"></i>Notification Preferences
        </h5>
    </div>
    <div class="card-body">
        <div class="settings-item">
            <div class="d-flex align-items-center">
                <div class="icon-box primary">
                    <i class="fas fa-envelope"></i>
                </div>
                <div class="flex-grow-1">
                    <h6 class="mb-1">Email Notifications</h6>
                    <p class="text-muted mb-0 small">Receive notifications via email</p>
                </div>
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" checked>
                </div>
            </div>
        </div>
        <div class="settings-item">
            <div class="d-flex align-items-center">
                <div class="icon-box success">
                    <i class="fas fa-mobile-alt"></i>
                </div>
                <div class="flex-grow-1">
                    <h6 class="mb-1">Push Notifications</h6>
                    <p class="text-muted mb-0 small">Receive push notifications on your devices</p>
                </div>
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox">
                </div>
            </div>
        </div>

        <div class="settings-item">
            <div class="d-flex align-items-center">
                <div class="icon-box warning">
                    <i class="fas fa-comments"></i>
                </div>
                <div class="flex-grow-1">
                    <h6 class="mb-1">SMS Notifications</h6>
                    <p class="text-muted mb-0 small">Receive important updates via SMS</p>
                </div>
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" checked>
                </div>
            </div>
        </div>
        
    </div>
</div>
