<div class="settings-card card">
    <div class="card-header">
        <h5 class="card-title mb-0"><i class="fas fa-palette me-2 text-success"></i>Appearance</h5>
    </div>
    <div class="card-body">
        <div class="mb-3">
            <label class="form-label">Theme</label>
            <select class="form-select">
                <option>Light</option>
                <option>Dark</option>
                <option>Auto</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Language</label>
            <select class="form-select">
                <option>English</option>
                <option>Spanish</option>
                <option>French</option>
            </select>
        </div>
    </div>
</div>
