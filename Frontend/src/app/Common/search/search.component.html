<div class="container">
<app-search-header></app-search-header>
    <div class="tab-content">
            <!-- Recent Section -->
            <div class="content-section px-3">
                <h6 class="section-title">Recent</h6>

                <div class="search-item">
                    <div class="search-item-content">
                        <div class="search-item-left">
                            <i class="bi bi-clock search-item-icon"></i>
                            <span class="search-item-text">travel</span>
                        </div>
                        <i class="bi bi-chevron-right search-item-arrow"></i>
                    </div>
                </div>

                <div class="search-item">
                    <div class="search-item-content">
                        <div class="search-item-left">
                            <i class="bi bi-clock search-item-icon"></i>
                            <span class="search-item-text">food</span>
                        </div>
                        <i class="bi bi-chevron-right search-item-arrow"></i>
                    </div>
                </div>

                <div class="search-item">
                    <div class="search-item-content">
                        <div class="search-item-left">
                            <i class="bi bi-clock search-item-icon"></i>
                            <span class="search-item-text">summer</span>
                        </div>
                        <i class="bi bi-chevron-right search-item-arrow"></i>
                    </div>
                </div>
            </div>

            <div class="content-section px-3">
                <h6 class="section-title">Trending</h6>

                <div class="search-item">
                    <div class="search-item-content">
                        <div class="search-item-left">
                            <i class="bi bi-airplane search-item-icon trending-icon-vacation"></i>
                            <span class="search-item-text">Vacation</span>
                        </div>
                    </div>
                </div>

                <div class="search-item">
                    <div class="search-item-content">
                        <div class="search-item-left">
                            <i class="bi bi-person search-item-icon trending-icon-user"></i>
                            <span class="search-item-text">alexjohnson</span>
                        </div>
                    </div>
                </div>

                <div class="search-item">
                    <div class="search-item-content">
                        <div class="search-item-left">
                            <i class="bi bi-hash search-item-icon trending-icon-hashtag"></i>
                            <span class="search-item-text">#photography</span>
                        </div>
                    </div>
                </div>

                <div class="search-item">
                    <div class="search-item-content">
                        <div class="search-item-left">
                            <i class="bi bi-geo-alt search-item-icon trending-icon-location"></i>
                            <span class="search-item-text">New York</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script>
    document.getElementById('searchInput').addEventListener('input', function (e) {
        const searchTerm = e.target.value.toLowerCase();

        if (searchTerm.length > 0) {
            document.querySelectorAll('.content-section').forEach(section => {
                section.style.display = 'none';
            });

            console.log('Searching for:', searchTerm);
        } else {
            document.querySelectorAll('.content-section').forEach(section => {
                section.style.display = 'block';
            });
        }
    });

    document.querySelectorAll('.search-item').forEach(item => {
        item.addEventListener('click', function () {
            const text = this.querySelector('.search-item-text').textContent;
            document.getElementById('searchInput').value = text;
            console.log('Selected:', text);
        });
    });

    document.querySelector('.cancel-btn').addEventListener('click', function (e) {
        e.preventDefault();
        document.getElementById('searchInput').value = '';
        document.querySelectorAll('.content-section').forEach(section => {
            section.style.display = 'block';
        });
    });
    document.getElementById('searchInput').focus();
</script>
