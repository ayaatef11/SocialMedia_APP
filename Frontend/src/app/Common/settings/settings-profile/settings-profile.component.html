<div class="settings-card card">
    <div class="card-header">
        <h5 class="card-title mb-0">
            <i class="fas fa-user me-2 text-success"></i>Profile Information
        </h5>
    </div>
    <div class="card-body">
        <div class="row">
            <div class="col-md-3 text-center">
                <img src="https://picsum.photos/150/150?random=profile" alt="Profile" class="profile-avatar mb-3">
                <div>
                    <button class="btn btn-outline-success btn-sm">Change Photo</button>
                </div>
            </div>
            <div class="col-md-9">
                <form>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">First Name</label>
                            <input type="text" class="form-control" value="John">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Last Name</label>
                            <input type="text" class="form-control" value="Doe">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" value="john.doe@example.com">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Phone</label>
                        <input type="tel" class="form-control" value="+1 (555) 123-4567">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Bio</label>
                        <textarea class="form-control" rows="3" placeholder="Tell us about yourself..."></textarea>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<div class="settings-card card">
    <div class="card-header">
        <h5 class="card-title mb-0">
            <i class="fas fa-map-marker-alt me-2 text-success"></i>Location
        </h5>
    </div>
    <div class="card-body">
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Country</label>
                <select class="form-select">
                    <option>United States</option>
                    <option>Canada</option>
                    <option>United Kingdom</option>
                </select>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Timezone</label>
                <select class="form-select">
                    <option>UTC-5 (Eastern Time)</option>
                    <option>UTC-8 (Pacific Time)</option>
                    <option>UTC+0 (GMT)</option>
                </select>
            </div>
        </div>
    </div>
</div>
