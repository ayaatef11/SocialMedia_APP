<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Archived Stories</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      background-color: #000;
      color: #fff;
    }

    .nav-tabs .nav-link.active {
      color: #fff;
      background-color: transparent;
      border: none;
      border-bottom: 2px solid #fff;
    }

    .nav-tabs .nav-link {
      color: #888;
      border: none;
    }

    .story-card {
      background-color: #1c1c1c;
      border-radius: 10px;
      overflow: hidden;
      position: relative;
    }

    .story-img {
      width: 100%;
      height: auto;
      display: block;
    }

    .date-badge {
      position: absolute;
      top: 10px;
      left: 10px;
      background-color: #fff;
      color: #000;
      border-radius: 8px;
      text-align: center;
      padding: 4px 8px;
      font-size: 12px;
    }

    .date-badge strong {
      display: block;
      font-size: 16px;
    }
  </style>
</head>
<body>

  <div class="container py-5">
    <ul class="nav nav-tabs border-0 mb-3">
      <li class="nav-item">
        <a class="nav-link active" href="#">STORIES</a>
      </li>
    </ul>
    <p class="text-muted">Only you can see your archived stories unless you choose to share them.</p>

    <div class="row g-4 mt-4">
      <!-- Story 1 -->
      <div class="col-md-4">
        <div class="story-card">
          <span class="date-badge">
            <strong>19</strong>Jul<br>2024
          </span>
          <img src="https://via.placeholder.com/300x500.png?text=Story+1" class="story-img" alt="Story 1" />
        </div>
      </div>

      <!-- Story 2 -->
      <div class="col-md-4">
        <div class="story-card bg-dark">
          <span class="date-badge">
            <strong>13</strong>Oct<br>2023
          </span>
          <img src="https://via.placeholder.com/300x500.png?text=Story+2" class="story-img" alt="Story 2" />
        </div>
      </div>

      <!-- Story 3 -->
      <div class="col-md-4">
        <div class="story-card">
          <span class="date-badge">
            <strong>26</strong>Feb
          </span>
          <img src="https://via.placeholder.com/300x500.png?text=Story+3" class="story-img" alt="Story 3" />
        </div>
      </div>
    </div>
  </div>

</body>
</html>
